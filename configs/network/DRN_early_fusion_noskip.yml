image_input_channels: 3

network:
  tri_checkpoint_path: ???
  depth_net:
    name: drn_early_fusion
    options:
      activation: elu
      image_extractor_hparams:
        version: 18        # choices=[18, 34, 50, 101, 152]
        input_channels: ${image_input_channels}
        zero_init_residual: False
      lidar_extractor_hparams:
        nfeatures: 5
        num_points: 1024
      decoder_hparams:
        predictor: inv_depth
        upsample_mode: res-pixelshuffle
        blur_at_end: False
        offsets: 1
        end_skip: False
        no_skip: True
      self_attention_hparams:
        num_heads: 4
        dim_head: 128
        mlp_ratio: 4.
        dropout: 0.
        sr_ratio: 1

  pose_net:
    name: monodepth2
    options:
      version: 18
      activation: elu
      input_channels: ${image_input_channels}

