input_channels: 3

network:
  tri_checkpoint_path: ???
  depth_net:
    name: attention_bottleneck
    options:
      activation: elu
      image_extractor_name: DRN_C
      image_extractor_hparams:
        version: 18        # choices=[18, 34, 50, 101, 152]
        input_channels: ${input_channels}
        zero_init_residual: False
      decoder_hparams:
        predictor: inv_depth
        upsample_mode: nearest
        offsets: 1
        end_skip: False
      transformer_hparams:
        drop: 0.
        attn_drop: 0.
        sr_ratio: 2         # [8, 4, 2, 1]
        num_heads: 4      # [1, 2, 5, 8]
        mlp_ratio: 4        # [8, 8, 4, 4]
  pose_net:
    name: monodepth2
    options:
      version: 18
      activation: elu
      input_channels: ${input_channels}