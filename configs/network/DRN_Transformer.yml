image_input_channels: 3

network:
  tri_checkpoint_path: ???
  depth_net:
    name: drn_transformer
    options:
      activation: elu
      image_extractor_name: DRN_C
      image_extractor_hparams:
        version: 18        # choices=[18, 34, 50, 101, 152]
        input_channels: ${image_input_channels}
        zero_init_residual: False
      lidar_extractor_hparams:
        nfeatures: 5
        num_points: 1024
      decoder_hparams:
        predictor: inv_depth
        upsample_mode: nearest
        offsets: 1
        end_skip: True
      fusion_hparams:
        drop_rate: 0.
        attn_drop: 0.
        patch_size: 2
        depth: 1
        sr_ratio: 2         # [8, 4, 2, 1]
        num_heads: 4      # [1, 2, 5, 8]
        mlp_ratio: 4        # [8, 8, 4, 4]
  pose_net:
    name: monodepth2
    options:
      version: 18
      activation: elu
      input_channels: ${image_input_channels}