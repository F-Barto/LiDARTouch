image_input_channels: 3

network:
  tri_checkpoint_path: ???
  depth_net:
    name: disparity_rescaling
    options:
      activation: elu
      image_extractor_name: resnet
      image_extractor_hparams:
        version: 18        # choices=[18, 34, 50, 101, 152]
        input_channels: ${image_input_channels}
        zero_init_residual: False
      lidar_extractor_name: pointnet2
      lidar_extractor_hparams:
        out_chans: 256
        nfeatures: 5
        num_points: 1024
      decoder_hparams:
        predictor: scaled_inv_depth
        upsample_mode: nearest
  pose_net:
    name: monodepth2
    options:
      version: 18
      activation: elu
      input_channels: ${image_input_channels}